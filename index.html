<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家人的生日倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "SimSun", serif !important;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 30px 0;
            color: #ffd700;
            font-size: 41.6px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .info span {
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 5px;
        }
        .countdown {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .time-unit {
            background: rgba(255,215,0,0.2);
            padding: 10px;
            border-radius: 10px;
            min-width: 60px;
        }
        .time-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
        }
        .time-label {
            font-size: 12px;
            color: #ccc;
        }
        .days-away {
            text-align: right;
            color: #88ff88;
            margin-top: 10px;
            font-size: 14px;
        }
        .happy-birthday {
            font-size: 36px !important;
            font-weight: bold !important;
            color: #ff0000 !important;
            text-align: center;
            padding: 20px 0;
            text-shadow: 0 0 15px #ff6666;
        }
        .preview-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .preview-btn:hover {
            opacity: 0.9;
        }
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        /* 祝福语模块 */
        .wish-section {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .wish-title {
            font-size: 15px;
            color: #fff;
        }
        .wish-input {
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.92);
            color: #222;
            font-size: 14px;
            width: 100%;
            min-height: 70px;
            resize: vertical;
        }
        .wish-btns {
            display: flex;
            gap: 10px;
        }
        .wish-btns button {
            padding: 7px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .save-btn {
            background: #4CAF50;
            color: white;
        }
        .del-btn {
            background: #f44336;
            color: white;
        }
        .saved-wish {
            color: #ffd700;
            font-size: 15px;
            padding: 10px;
            background: rgba(255,215,0,0.12);
            border-radius: 6px;
            word-break: break-all;
            line-height: 1.5;
        }
        .wish-fall {
            position: absolute;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 6px #ffd700, 0 0 12px red;
            white-space: nowrap;
            pointer-events: none;
        }
        @keyframes fall {
            to { top: 100%; opacity: 0; }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #000;
            z-index: 99;
            transition: all 0.3s ease;
        }
        .music-btn.playing {
            animation: rotate 8s linear infinite;
        }
    </style>
</head>
<body>

<div id="fireworks"></div>

<button class="music-btn" id="musicBtn">🔔</button>

<audio id="birthdayMusic" loop>
    <source src="Summer Salt - Another Piece of the Cake (1).mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>🎂 家人生日倒计时 🎂</h1>
    <div id="birthdayList"></div>
</div>

<script>
const familyData = [
    { name: "妈妈", lunarMonth: 1, lunarDay: 15 },
    { name: "吴媛媛", solarMonth: 1, solarDay: 15, solar: true },
    { name: "吴小飞", solarMonth: 2, solarDay: 17, solar: true },
    { name: "张珊珊", lunarMonth: 6, lunarDay: 6 },
    { name: "周诣泽", solarMonth: 6, solarDay: 18, solar: true },
    { name: "王子阳", lunarMonth: 8, lunarDay: 13 },
    { name: "王明", lunarMonth: 9, lunarDay: 2 },
    { name: "周诣诺", solarMonth: 10, solarDay: 5, solar: true },
    { name: "张南南", lunarMonth: 10, lunarDay: 10 },
    { name: "周超杰", lunarMonth: 11, lunarDay: 18 },
    { name: "吴逸晨", solarMonth: 12, solarDay: 25, solar: true },
    { name: "张连连", solarMonth: 12, solarDay: 27, solar: true }
];

let activeBirthdayPerson = null;
const WISH_STORAGE_KEY = "family_birthday_wishes";

function getWishData() {
    const data = localStorage.getItem(WISH_STORAGE_KEY);
    return data ? JSON.parse(data) : {};
}
function saveWish(name) {
    const input = document.getElementById(`wish-${name}`);
    const text = input.value.trim();
    const data = getWishData();
    data[name] = text;
    localStorage.setItem(WISH_STORAGE_KEY, JSON.stringify(data));
    alert("祝福语保存成功！");
    initPage(); // 保存后刷新列表显示“已保存”状态
}
function deleteWish(name) {
    if(confirm("确定要删除祝福吗？")){
        const data = getWishData();
        delete data[name];
        localStorage.setItem(WISH_STORAGE_KEY, JSON.stringify(data));
        initPage();
    }
}
function getWish(name) {
    return getWishData()[name] || "";
}

function getSolarNextBirthday(month, day) {
    const now = new Date();
    let bd = new Date(now.getFullYear(), month - 1, day);
    if (bd < now) bd = new Date(now.getFullYear() + 1, month - 1, day);
    return bd;
}

// 简易阴历转阳历估算（注意：如需极度精准建议引用专门的阴历库，这里保留你的原逻辑）
function getLunarNextBirthday(lunarM, lunarD) {
    const now = new Date();
    const lunarBase = [15,14,15,15,16,15,16,15,16,15,15,15];
    let m = lunarM;
    let d = lunarD + lunarBase[m-1];
    let year = now.getFullYear();
    if(d>31){d-=31;m++;}
    if(m>12){m-=12;year++;}
    let bd = new Date(year, m-1, d);
    if(bd<now){
        year++;
        bd = new Date(year, m-1, d);
    }
    return bd;
}

function getPersonNextBirthday(person) {
    return person.solar 
        ? getSolarNextBirthday(person.solarMonth, person.solarDay)
        : getLunarNextBirthday(person.lunarMonth, person.lunarDay);
}

function getCountdownDiff(targetDate) {
    const now = Date.now();
    const diff = targetDate.getTime() - now;
    if(diff <= 0) return {d:0,h:0,m:0,s:0};
    return {
        d: Math.floor(diff / 86400000),
        h: Math.floor((diff % 86400000) / 3600000),
        m: Math.floor((diff % 3600000) / 60000),
        s: Math.floor((diff % 60000) / 1000)
    };
}

function getRemainDays(targetDate) {
    const now = new Date();
    return Math.ceil((targetDate.getTime() - now.getTime()) / 86400000);
}

function createFireworks(wishText = "") {
    const fw = document.getElementById('fireworks');
    fw.innerHTML = '';
    const colors = ['#ff0','#f00','#0f0','#0ff','#f0f','#fff','#ffd700'];
    const symbols = ['💰','🪙','🧧','💴'];
    for(let i=0; i<150; i++) {
        const div = document.createElement('div');
        div.style.cssText = `
            position:absolute;
            font-size:${Math.random()*15+5}px;
            color:${colors[Math.floor(Math.random()*colors.length)]};
            left:${Math.random()*100}%;
            top:-20px;
            animation: fall ${Math.random()*2+2}s linear forwards;
        `;
        div.innerHTML = Math.random() > 0.7 ? symbols[Math.floor(Math.random()*symbols.length)] : '✨';
        fw.appendChild(div);
    }
    if(wishText){
        const el = document.createElement('div');
        el.className = 'wish-fall';
        el.textContent = wishText;
        el.style.left = '50%';
        el.style.transform = 'translateX(-50%)';
        el.style.top = '-50px';
        el.style.animation = `fall 5s ease-in forwards`;
        fw.appendChild(el);
    }
}

function initPage() {
    const container = document.getElementById("birthdayList");
    container.innerHTML = "";
    const sortedList = familyData.map(p => {
        const bd = getPersonNextBirthday(p);
        return { ...p, bd, days: getRemainDays(bd) };
    }).sort((a, b) => a.days - b.days);

    sortedList.forEach(p => {
        const cd = getCountdownDiff(p.bd);
        const wish = getWish(p.name);
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.name = p.name;
        
        const dateText = p.solar ? `阳历 ${p.solarMonth}月${p.solarDay}日` : `阴历 ${p.lunarMonth}月${p.lunarDay}日`;

        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="info">
                <span>${dateText}</span>
                <span>下次生日：${p.bd.getFullYear()}-${p.bd.getMonth()+1}-${p.bd.getDate()}</span>
            </div>
            <div class="wish-section">
                <textarea class="wish-input" id="wish-${p.name}" placeholder="写下对${p.name}的祝福...">${wish}</textarea>
                <div class="wish-btns">
                    <button class="save-btn" onclick="saveWish('${p.name}')">保存祝福</button>
                    <button class="del-btn" onclick="deleteWish('${p.name}')">清空</button>
                </div>
                ${wish ? `<div class="saved-wish">💌 已保存：${wish}</div>` : ''}
            </div>
            <div class="content-wrap">
                <div class="countdown">
                    <div class="time-unit"><div class="time-value d">${cd.d}</div><div class="time-label">天</div></div>
                    <div class="time-unit"><div class="time-value h">${cd.h}</div><div class="time-label">时</div></div>
                    <div class="time-unit"><div class="time-value m">${cd.m}</div><div class="time-label">分</div></div>
                    <div class="time-unit"><div class="time-value s">${cd.s}</div><div class="time-label">秒</div></div>
                </div>
            </div>
            <div class="days-away">距离生日还有 ${p.days} 天</div>
            <button class="preview-btn" onclick="toggleBirthday('${p.name}')">预览生日祝福特效</button>
        `;
        container.appendChild(card);
    });
}

function toggleBirthday(name) {
    const music = document.getElementById('birthdayMusic');
    const musicBtn = document.getElementById('musicBtn');
    
    if(activeBirthdayPerson === name){
        activeBirthdayPerson = null;
        initPage();
    }else{
        activeBirthdayPerson = name;
        createFireworks(getWish(name));
        music.currentTime = 0;
        music.play().catch(e => console.log("需用户交互后播放"));
        musicBtn.classList.add('playing');
        
        const card = document.querySelector(`.card[data-name="${name}"]`);
        card.querySelector('.content-wrap').innerHTML = `<div class="happy-birthday">🎂 祝${name}生日快乐！ 🎂</div>`;
        card.querySelector('.preview-btn').innerText = '返回倒计时';
    }
}

const musicBtn = document.getElementById('musicBtn');
const music = document.getElementById('birthdayMusic');
musicBtn.addEventListener('click', () => {
    if(music.paused){
        music.play();
        musicBtn.classList.add('playing');
    }else{
        music.pause();
        musicBtn.classList.remove('playing');
    }
});

setInterval(() => {
    if(!activeBirthdayPerson) {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const name = card.dataset.name;
            const person = familyData.find(f => f.name === name);
            const bd = getPersonNextBirthday(person);
            const cd = getCountdownDiff(bd);
            const dEl = card.querySelector('.d');
            if(dEl){
                card.querySelector('.d').innerText = cd.d;
                card.querySelector('.h').innerText = cd.h;
                card.querySelector('.m').innerText = cd.m;
                card.querySelector('.s').innerText = cd.s;
            }
        });
    }
}, 1000);

initPage();
</script>
</body>
</html>
