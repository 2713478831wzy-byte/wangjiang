<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家人的生日倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "SimSun", sans-serif !important;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        h1 {
            text-align: center;
            margin: 30px 0;
            color: #ffd700;
            font-size: 41.6px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .info span {
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 5px;
        }
        .countdown {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .time-unit {
            background: rgba(255,215,0,0.2);
            padding: 10px;
            border-radius: 10px;
            min-width: 60px;
        }
        .time-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
        }
        .time-label {
            font-size: 12px;
            color: #ccc;
        }
        .days-away {
            text-align: right;
            color: #88ff88;
            margin-top: 10px;
            font-size: 14px;
        }
        .happy-birthday {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px !important;
            font-weight: bold !important;
            color: #ff0000 !important;
            text-align: center;
            z-index: 9999;
            text-shadow: 0 0 20px #ffd700, 0 0 40px red;
        }
        .preview-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .wish-section, .dream-section {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .wish-input, .dream-input {
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.92);
            color: #222;
            font-size: 14px;
            width: 100%;
            min-height: 70px;
            resize: vertical;
        }
        .wish-btns, .dream-btns {
            display: flex;
            gap: 10px;
        }
        .save-btn { background: #4CAF50; color: white; border:none; padding:6px 12px; border-radius:6px;cursor:pointer; }
        .del-btn { background: #f44336; color: white; border:none; padding:6px 12px; border-radius:6px;cursor:pointer; }
        .saved-wish, .saved-dream {
            color: #ffd700;
            font-size: 15px;
            padding: 10px;
            background: rgba(255,215,0,0.12);
            border-radius: 6px;
            line-height: 1.5;
        }
        .bottom-fire {
            position: absolute;
            bottom: 0;
            font-size: 30px;
            pointer-events: none;
        }
        .wish-fall {
            position: absolute;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 6px #ffd700, 0 0 12px red;
            white-space: nowrap;
            pointer-events: none;
        }
        @keyframes fall {to { top: 100%; opacity: 0; }}
        @keyframes bottomRise {0%{transform:translateY(0);opacity: 1;}100%{transform:translateY(-80vh);opacity:0;}}
        @keyframes rotate {from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

        .float-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }
        .music-btn, .album-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            cursor: pointer;
            font-size: 26px;
        }
        .music-btn {background: linear-gradient(45deg, #ffd700, #ff8c00);}
        .album-btn {background: linear-gradient(45deg, #ff69b4, #ff1493);}
        .music-btn.playing{animation:rotate 8s linear infinite;}

        #albumModal {
            display: none;
            position: fixed;
            top: 0;left: 0;
            width: 100%;height: 100%;
            background: #000;z-index:2000;
            touch-action: pan-y;
        }
        #albumImg {width:100%;height:100%;object-fit:contain;display:block;}
        .album-close{
            position:absolute;top:20px;right:20px;
            width:50px;height:50px;border-radius:50%;
            background:rgba(0,0,0,0.5);color:#fff;
            font-size:30px;display:flex;align-items:center;justify-content:center;
            cursor:pointer;z-index:2001;
        }
        .album-prev, .album-next {
            position:absolute;top:50%;transform:translateY(-50%);
            width:60px;height:60px;border-radius:50%;
            background:rgba(255,255,255,0.2);color:#fff;
            font-size:30px;display:flex;align-items:center;justify-content:center;
            cursor:pointer;z-index:2001;border:none;
        }
        .album-prev {left:20px;}
        .album-next {right:20px;}
    </style>
</head>
<body>
<div id="fireworks"></div>

<div class="float-buttons">
    <button class="music-btn" id="musicBtn">🔔</button>
    <button class="album-btn" id="albumBtn">🖼️</button>
</div>

<audio id="birthdayMusic" loop preload="auto">
    <source src="陈奕迅 - Lonely Christmas.mp3" type="audio/mpeg">
</audio>

<div id="albumModal">
    <div class="album-close" onclick="closeAlbum()">✕</div>
    <button class="album-prev" onclick="prevImg()">←</button>
    <img id="albumImg" src="">
    <button class="album-next" onclick="nextImg()">→</button>
</div>

<div class="container">
    <h1>🎂 家人生日倒计时 🎂</h1>
    <div id="birthdayList"></div>
</div>

<script>
const familyData = [
    { name: "妈妈", lunarMonth: 1, lunarDay: 15 },
    { name: "吴媛媛", solarMonth: 1, solarDay: 15, solar: true },
    { name: "吴小飞", solarMonth: 2, solarDay: 17, solar: true },
    { name: "张珊珊", lunarMonth: 6, lunarDay: 6 },
    { name: "周诣泽", solarMonth: 6, solarDay: 18, solar: true },
    { name: "王子阳", lunarMonth: 8, lunarDay: 13 },
    { name: "王明", lunarMonth: 9, lunarDay: 2 },
    { name: "周诣诺", solarMonth: 10, solarDay: 5, solar: true },
    { name: "张南南", lunarMonth: 10, lunarDay: 10 },
    { name: "周超杰", lunarMonth: 11, lunarDay: 18 },
    { name: "吴逸晨", solarMonth: 12, solarDay: 25, solar: true },
    { name: "张连连", solarMonth: 12, solarDay: 27, solar: true }
];

let activeBirthdayPerson = null;
const WISH_STORAGE_KEY = "family_birthday_wishes";
const DREAM_STORAGE_KEY = "family_birthday_dreams";

const albumImages = [
    "yuanyuan.jpg",
    "yuanyuan1.jpg",
    "jiajia.jpg",
    "nannan.jpg",
    "nuonuo.jpg",
    "nuonuo1.jpg",
    "nuonuo2.jpg",
    "ruirui.jpg",
    "yangyang.jpg",
    "zeze.jpg",
    "zeze2.jpg",
    "img1.jpg",
    "img2.jpg",
    "img3.jpg",
    "img4.jpg",
    "img5.jpg",
    "img6.jpg",
    "img7.jpg",
    "img8.jpg",
    "img9.jpg",
    "img10.jpg"
];
let currentAlbumIndex = 0;

window.openAlbum = function(){
    currentAlbumIndex = 0;
    const m = document.getElementById('albumModal');
    const img = document.getElementById('albumImg');
    img.src = albumImages[currentAlbumIndex];
    m.style.display = "block";
}
window.closeAlbum = function(){
    document.getElementById('albumModal').style.display = "none";
}
function nextImg(){
    currentAlbumIndex++;
    if(currentAlbumIndex >= albumImages.length) currentAlbumIndex = 0;
    document.getElementById('albumImg').src = albumImages[currentAlbumIndex];
}
function prevImg(){
    currentAlbumIndex--;
    if(currentAlbumIndex < 0) currentAlbumIndex = albumImages.length - 1;
    document.getElementById('albumImg').src = albumImages[currentAlbumIndex];
}

document.addEventListener('keydown', function(e){
    if(document.getElementById('albumModal').style.display === 'block'){
        if(e.key === 'ArrowLeft') prevImg();
        if(e.key === 'ArrowRight') nextImg();
    }
});

let startY = 0;
document.getElementById("albumModal").addEventListener("touchstart",e=>startY=e.touches[0].clientY);
document.getElementById("albumModal").addEventListener("touchend",e=>{
    let endY = e.changedTouches[0].clientY;
    if(startY - endY > 60) nextImg();
    if(endY - startY > 60) prevImg();
});

function createBottomFireworks() {
    const fw = document.getElementById('fireworks');
    const colors = ['#ff0','#f00','#0f0','#0ff','#f0f','#ffd700','#ff8c00'];
    const emojis = ['🎆','🎇','✨','🌟','💥'];
    for(let i = 0; i <= 20; i++){
        const bFire = document.createElement('div');
        bFire.className = "bottom-fire";
        bFire.style.left = `${i * 5}%`;
        bFire.style.color = colors[Math.floor(Math.random() * colors.length)];
        bFire.style.animation = `bottomRise ${Math.random() * 2 + 2.5}s ease-out forwards`;
        bFire.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        fw.appendChild(bFire);
    }
}
function createFireworks(wishText = "") {
    const fw = document.getElementById('fireworks');
    const colors = ['#ff0','#f00','#0f0','#0ff','#f0f','#fff','#ffd700'];
    const symbols = ['💰','🪙','🧧','💴'];
    for(let i=0; i<120; i++) {
        const div = document.createElement('div');
        div.style.cssText = `
            position:absolute;
            font-size:${Math.random()*15+5}px;
            color:${colors[Math.floor(Math.random()*colors.length)]};
            left:${Math.random()*100}%;
            top:-20px;
            animation: fall ${Math.random()*2+2}s linear forwards;
        `;
        div.innerHTML = Math.random() > 0.7 ? symbols[Math.floor(Math.random()*symbols.length)] : '✨';
        fw.appendChild(div);
    }
    if(wishText){
        const el = document.createElement('div');
        el.className = 'wish-fall';
        el.textContent = wishText;
        el.style.left = '50%';
        el.style.transform = 'translateX(-50%)';
        el.style.top = '-50px';
        el.style.animation = `fall 5s ease-in forwards`;
        fw.appendChild(el);
    }
    createBottomFireworks();
}

window.toggleBirthday = function(name){
    const card = document.querySelector(`.card[data-name="${name}"]`);
    const btn = card.querySelector('.preview-btn');
    
    if(activeBirthdayPerson === name){
        activeBirthdayPerson = null;
        document.getElementById('fireworks').innerHTML = '';
        document.querySelector('.happy-birthday')?.remove();
        btn.innerText = '预览生日特效';
        initPage();
    }else{
        activeBirthdayPerson = name;
        document.getElementById('fireworks').innerHTML = '';
        document.querySelector('.happy-birthday')?.remove();
        
        const wish = getWishData()[name] || "";
        createFireworks(wish);
        
        const text = document.createElement('div');
        text.className = 'happy-birthday';
        text.textContent = `🎉 祝${name}生日快乐 🎉`;
        document.body.appendChild(text);
        
        btn.innerText = '返回倒计时';
    }
};

function getWishData(){let d=localStorage.getItem(WISH_STORAGE_KEY);return d?JSON.parse(d):{}}
function getDreamData(){let d=localStorage.getItem(DREAM_STORAGE_KEY);return d?JSON.parse(d):{}}
window.saveWish=function(n){let i=document.getElementById(`wish-${n}`).value.trim();let o=getWishData();o[n]=i;localStorage.setItem(WISH_STORAGE_KEY,JSON.stringify(o));initPage();alert("保存成功");}
window.deleteWish=function(n){if(confirm("确定清空？")){let o=getWishData();delete o[n];localStorage.setItem(WISH_STORAGE_KEY,JSON.stringify(o));initPage();}}
window.saveDream=function(n){let i=document.getElementById(`dream-${n}`).value.trim();let o=getDreamData();o[n]=i;localStorage.setItem(DREAM_STORAGE_KEY,JSON.stringify(o));initPage();alert("保存成功");}
window.deleteDream=function(n){if(confirm("确定清空？")){let o=getDreamData();delete o[n];localStorage.setItem(DREAM_STORAGE_KEY,JSON.stringify(o));initPage();}}

function getSolarBirthday(m,d){
    let now=new Date();
    let bd=new Date(now.getFullYear(),m-1,d);
    if(bd<now)bd=new Date(now.getFullYear()+1,m-1,d);
    return bd;
}
function getLunarBirthday(lm,ld){
    let now=new Date();
    let y=now.getFullYear();
    let bd=new Date(y,lm-1,ld+15);
    if(bd<now)bd=new Date(y+1,lm-1,ld+15);
    return bd;
}
function getDiff(time){
    let d=time-Date.now();
    return{
        d:Math.floor(d/86400000),
        h:Math.floor((d % 86400000) / 3600000),
        m:Math.floor((d % 3600000) / 60000),
        s:Math.floor((d % 60000) / 1000)
    }
}

function initPage(){
    let wrap=document.getElementById("birthdayList");
    wrap.innerHTML="";
    let list=familyData.map(item=>{
        let bd=item.solar?getSolarBirthday(item.solarMonth,item.solarDay):getLunarBirthday(item.lunarMonth,item.lunarDay);
        return {...item,bd,day:Math.ceil((bd.getTime()-Date.now())/86400000)}
    }).sort((a,b)=>a.day-b.day);

    list.forEach(p=>{
        let cd=getDiff(p.bd);
        let wish=getWishData()[p.name]||"";
        let dream=getDreamData()[p.name]||"";
        let dateStr=p.solar?`阳历${p.solarMonth}月${p.solarDay}日`:`阴历${p.lunarMonth}月${p.lunarDay}日`;
        let card=document.createElement("div");
        card.className="card";
        card.dataset.name = p.name;
        card.innerHTML=`
            <div class="name">${p.name}</div>
            <div class="info"><span>${dateStr}</span><span>下次：${p.bd.getFullYear()}-${p.bd.getMonth()+1}-${p.bd.getDate()}</span></div>
            <div class="wish-section">
                <textarea class="wish-input" id="wish-${p.name}" placeholder="写下祝福">${wish}</textarea>
                <div class="wish-btns"><button class="save-btn" onclick="saveWish('${p.name}')">保存</button><button class="del-btn" onclick="deleteWish('${p.name}')">清空</button></div>
                ${wish?`<div class="saved-wish">${wish}</div>`:""}
            </div>
            <div class="dream-section">
                <textarea class="dream-input" id="dream-${p.name}" placeholder="写下心愿">${dream}</textarea>
                <div class="dream-btns"><button class="save-btn" onclick="saveDream('${p.name}')">保存</button><button class="del-btn" onclick="deleteDream('${p.name}')">清空</button></div>
                ${dream?`<div class="saved-dream">${dream}</div>`:""}
            </div>
            <div class="countdown">
                <div class="time-unit"><div class="time-value d">${cd.d}</div><div class="time-label">天</div></div>
                <div class="time-unit"><div class="time-value h">${cd.h}</div><div class="time-label">时</div></div>
                <div class="time-unit"><div class="time-value m">${cd.m}</div><div class="time-label">分</div></div>
                <div class="time-unit"><div class="time-value s">${cd.s}</div><div class="time-label">秒</div></div>
            </div>
            <div class="days-away">还有 ${p.day} 天</div>
            <button class="preview-btn" onclick="toggleBirthday('${p.name}')">预览生日特效</button>
        `;
        wrap.appendChild(card);
    })
}

document.getElementById("albumBtn").onclick=openAlbum;
const music=document.getElementById("birthdayMusic");
document.getElementById("musicBtn").onclick=function(){
    if(music.paused){music.play();this.classList.add("playing");}
    else{music.pause();this.classList.remove("playing");}
}

setInterval(() => {
    if(!activeBirthdayPerson) {
        document.querySelectorAll('.card').forEach(card => {
            const name = card.dataset.name;
            const person = familyData.find(f => f.name === name);
            const bd = person.solar ? getSolarBirthday(person.solarMonth, person.solarDay) : getLunarBirthday(person.lunarMonth, person.lunarDay);
            const cd = getDiff(bd);
            
            card.querySelector('.d').innerText = cd.d;
            card.querySelector('.h').innerText = cd.h;
            card.querySelector('.m').innerText = cd.m;
            card.querySelector('.s').innerText = cd.s;
        });
    }
}, 1000);

initPage();
</script>
</body>
</html>
