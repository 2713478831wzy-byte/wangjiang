<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家人的生日倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .name {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info span {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .countdown {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .time-unit {
            background: rgba(255, 215, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            min-width: 60px;
        }

        .time-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .time-label {
            font-size: 0.8em;
            color: #ccc;
        }

        .days-away {
            text-align: right;
            color: #88ff88;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* 生日当天祝福样式 */
        .birthday-bless {
            font-size: 28px;
            font-weight: bold;
            color: #ff2222;
            text-align: center;
            padding: 20px 0;
            text-shadow: 0 0 10px #ff6666;
        }

        /* 预览按钮 */
        .preview-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            font-size: 14px;
        }
        .preview-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎂 家人生日倒计时 🎂</h1>
        <div id="birthdayList"></div>
    </div>

    <script>
        // 你的家人数据
        const familyData = [
            { name: "妈妈", lunarMonth: 1, lunarDay: 15 },
            { name: "吴媛媛", solarMonth: 1, solarDay: 15, solar: true },
            { name: "吴小飞", solarMonth: 2, solarDay: 17, solar: true },
            { name: "张珊珊", lunarMonth: 6, lunarDay: 6 },
            { name: "周诣泽", solarMonth: 6, solarDay: 18, solar: true },
            { name: "王子阳", lunarMonth: 8, lunarDay: 13 },
            { name: "王明", lunarMonth: 9, lunarDay: 2 },
            { name: "周诣诺", solarMonth: 10, solarDay: 5, solar: true },
            { name: "张南南", lunarMonth: 10, lunarDay: 10 },
            { name: "周超杰", lunarMonth: 11, lunarDay: 18 },
            { name: "吴逸晨", solarMonth: 12, solarDay: 25, solar: true },
            { name: "张连连", solarMonth: 12, solarDay: 27, solar: true }
        ];

        // 全局预览标记
        let previewId = null;

        // 阴历转阳历
        function getNextSolarBirthday(person) {
            const now = new Date();
            const currentYear = now.getFullYear();

            if (person.solar) {
                let birthday = new Date(currentYear, person.solarMonth - 1, person.solarDay);
                if (birthday < now) {
                    birthday = new Date(currentYear + 1, person.solarMonth - 1, person.solarDay);
                }
                return birthday;
            }

            const lunarOffset = [15, 14, 15, 15, 16, 15, 16, 15, 16, 15, 15, 15];
            let month = person.lunarMonth;
            let day = person.lunarDay + lunarOffset[month - 1];
            let year = currentYear;

            if (day > 31) {
                day -= 31;
                month++;
            }
            if (month > 12) {
                month -= 12;
                year++;
            }

            let birthday = new Date(year, month - 1, day);
            if (birthday < now) {
                birthday = new Date(year + 1, month - 1, day);
            }
            return birthday;
        }

        // 判断是否是今天
        function isBirthdayToday(targetDate) {
            const today = new Date();
            return (
                targetDate.getDate() === today.getDate() &&
                targetDate.getMonth() === today.getMonth() &&
                targetDate.getFullYear() === today.getFullYear()
            );
        }

        // 计算倒计时
        function getCountdown(targetDate) {
            const now = new Date();
            const diff = targetDate - now;
            if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0 };

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            return { days, hours, minutes, seconds };
        }

        // 渲染列表
        function renderList() {
            const list = document.getElementById("birthdayList");
            list.innerHTML = "";

            const peopleWithBirthday = familyData.map((person, index) => {
                const birthday = getNextSolarBirthday(person);
                const daysAway = Math.floor((birthday - new Date()) / (1000 * 60 * 60 * 24));
                return { ...person, birthday, daysAway, index };
            }).sort((a, b) => a.daysAway - b.daysAway);

            peopleWithBirthday.forEach(person => {
                const isToday = isBirthdayToday(person.birthday);
                const isPreview = previewId === person.name;
                const countdown = getCountdown(person.birthday);

                const card = document.createElement("div");
                card.className = "card";

                const dateText = person.solar
                    ? `阳历 ${person.solarMonth}月${person.solarDay}日`
                    : `阴历 ${person.lunarMonth}月${person.lunarDay}日`;

                let centerHtml = "";
                if (isToday || isPreview) {
                    centerHtml = `<div class="birthday-bless">🎉 祝${person.name}生日快乐！ 🎉</div>`;
                } else {
                    centerHtml = `
                    <div class="countdown">
                        <div class="time-unit">
                            <div class="time-value">${countdown.days}</div>
                            <div class="time-label">天</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${countdown.hours}</div>
                            <div class="time-label">时</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${countdown.minutes}</div>
                            <div class="time-label">分</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${countdown.seconds}</div>
                            <div class="time-label">秒</div>
                        </div>
                    </div>
                    `;
                }

                card.innerHTML = `
                    <div class="name">${person.name}</div>
                    <div class="info">
                        <span>${dateText}</span>
                        <span>下一次: ${person.birthday.getFullYear()}年${person.birthday.getMonth() + 1}月${person.birthday.getDate()}日</span>
                    </div>
                    ${centerHtml}
                    <div class="days-away">还有 ${person.daysAway} 天</div>
                    <button class="preview-btn" onclick="previewBless('${person.name}')">预览生日效果</button>
                `;
                list.appendChild(card);
            });
        }

        // 预览祝福
        window.previewBless = function (name) {
            previewId = name;
            renderList();
            setTimeout(() => {
                previewId = null;
                renderList();
            }, 3000);
        }

        // 启动
        renderList();
        setInterval(renderList, 1000);
    </script>
</body>
</html>
